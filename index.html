<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 챌린지: 모바일 모션 트레이너</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://unpkg.com/ml5@0.12.2/dist/ml5.min.js"></script>

    <style>
        body { 
            font-family: 'Malgun Gothic', sans-serif; 
            margin: 0; padding: 20px; 
            background: linear-gradient(to bottom, #1e1b4b, #0f172a); 
            color: #f8fafc; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            min-height: 100vh; box-sizing: border-box; 
        }
        h1 { font-size: 1.6rem; margin-bottom: 5px; color: #38bdf8; text-align: center; }
        p { font-size: 0.9rem; color: #94a3b8; margin-top: 0; margin-bottom: 15px; text-align: center; }

        #dashboard {
            display: flex; gap: 15px; width: 100%; max-width: 500px; margin-bottom: 15px;
            z-index: 10;
        }
        .info-box { 
            flex: 1; background: #1e293b; padding: 10px; border-radius: 12px; 
            text-align: center; border: 1px solid #334155; font-weight: bold;
        }
        .count-num { font-size: 1.5rem; color: #facc15; display: block; margin-top: 5px; }

        /* 💡 모바일 캔버스 박스 스케일링 설정 */
        #canvas-holder {
            position: relative; width: 100%; max-width: 500px; aspect-ratio: 4 / 3;
            border-radius: 16px; overflow: hidden; border: 2px solid #334155;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
            background-color: #000;
        }
        canvas { width: 100% !important; height: 100% !important; object-fit: cover; }
    </style>
</head>
<body>

    <h1>🏋️‍♂️ AI 모션 트레이너</h1>
    <p>카메라 앞에서 양손을 번쩍 들어 '만세'를 해보세요!</p>
    
    <div id="dashboard">
        <div class="info-box">현재 상태 <span id="status-text" style="color:#38bdf8; display:block; margin-top:5px;">로딩 중...</span></div>
        <div class="info-box">만세 횟수 <span id="counter" class="count-num">0</span></div>
    </div>
    
    <div id="canvas-holder"></div>

    <script>
        let video;
        let poseNet;
        let poses = [];
        
        let count = 0;
        let isManse = false;
        
        const statusText = document.getElementById('status-text');
        const counterElement = document.getElementById('counter');

        // 1. p5.js 설정 및 카메라 강제 구동 (모바일 멈춤 철저히 방지)
        function setup() {
            // 화면 크기에 맞는 대화형 캔버스 생성 및 지정 구역 배치
            const canvas = createCanvas(640, 480);
            canvas.parent('canvas-holder');

            // 스마트폰 전면 카메라 요청 옵션 세팅
            const constraints = {
                video: { facingMode: "user", width: 640, height: 480 },
                audio: false
            };
            
            statusText.innerText = "카메라 연결 중...";
            video = createCapture(constraints, function(stream) {
                statusText.innerText = "AI 엔진 로드 중...";
                // 모바일 브라우저의 강제 정지를 막기 위한 play 유도
                const videoEl = document.querySelector('video');
                if(videoEl) {
                    videoEl.setAttribute('playsinline', '');
                    videoEl.muted = true;
                    videoEl.play();
                }
            });
            video.size(640, 480);
            video.hide(); // 원본 영상 피드는 숨김

            // 2. 포즈 인식 엔진(PoseNet) 초기화
            poseNet = ml5.poseNet(video, modelReady);
            poseNet.on('pose', function(results) {
                poses = results;
            });
        }

        function modelReady() {
            statusText.innerText = "자세 대기 중";
        }

        // 3. 매 프레임마다 모바일 화면을 다시 그리는 메인 루프 함수
        function draw() {
            // 카메라 영상 화면 출력
            image(video, 0, 0, width, height);

            // 인식된 포즈 데이터가 존재할 때만 연산 가동
            if (poses.length > 0) {
                let pose = poses[0].pose;

                // 관절 포인트 드로잉 연산
                for (let i = 0; i < pose.keypoints.length; i++) {
                    let keypoint = pose.keypoints[i];
                    if (keypoint.score > 0.2) {
                        fill(255, 0, 85);
                        noStroke();
                        ellipse(keypoint.position.x, keypoint.position.y, 10, 10);
                    }
                }

                // 💡 주요 관절 데이터 추출 (어깨 및 손목)
                let leftShoulder = pose.leftShoulder;
                let rightShoulder = pose.rightShoulder;
                let leftWrist = pose.leftWrist;
                let rightWrist = pose.rightWrist;

                // 4. [동작 인식 조건문] 양 손목이 양 어깨보다 위로 올라갔는지 판별
                // (화면 좌표계 특성상 Y값이 작을수록 상단임)
                if (leftWrist.confidence > 0.3 && rightWrist.confidence > 0.3) {
                    if (leftWrist.y < leftShoulder.y && rightWrist.y < rightShoulder.y) {
                        statusText.innerText = "🙌 만세 성공!!";
                        statusText.style.color = "#4ade80";
                        
                        if (!isManse) {
                            count++;
                            counterElement.innerText = count;
                            isManse = true;
                        }
                    } else {
                        statusText.innerText = "자세 대기 중";
                        statusText.style.color = "#38bdf8";
                        isManse = false;
                    }
                }
            }
        }
    </script>
</body>
</html>
