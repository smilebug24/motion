<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 챌린지: 실시간 동작 인식기</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>

    <style>
        body { 
            font-family: 'Malgun Gothic', sans-serif; 
            margin: 0; padding: 20px; 
            background: linear-gradient(to bottom, #1e1b4b, #0f172a); 
            color: #f8fafc; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            min-height: 100vh; box-sizing: border-box; 
        }
        h1 { font-size: 1.6rem; margin-bottom: 5px; color: #38bdf8; text-align: center; }
        p { font-size: 0.9rem; color: #94a3b8; margin-top: 0; margin-bottom: 15px; text-align: center; }

        #dashboard {
            display: flex; gap: 15px; width: 100%; max-width: 500px; margin-bottom: 15px;
        }
        .info-box { 
            flex: 1; background: #1e293b; padding: 10px; border-radius: 12px; 
            text-align: center; border: 1px solid #334155; font-weight: bold;
        }
        .count-num { font-size: 1.5rem; color: #facc15; display: block; margin-top: 5px; }

        /* 모바일 플렉서블 컨테이너 */
        #canvas-container { 
            position: relative; width: 100%; max-width: 500px; aspect-ratio: 4 / 3; 
            background: #000; border-radius: 16px; overflow: hidden; border: 2px solid #334155; 
        }
        /* 💡 모바일 멈춤 해결을 위해 video 요소를 완전히 숨기지 않고 1x1 픽셀로 활성화 상태 유지 */
        video { position: absolute; width: 1px; height: 1px; opacity: 0; } 
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <h1>🏋️‍♂️ AI 모션 트레이너</h1>
    <p>카메라 앞에서 양손을 번쩍 들어 '만세'를 해보세요!</p>
    
    <div id="dashboard">
        <div class="info-box">현재 상태 <span id="status-text" style="color:#38bdf8; display:block; margin-top:5px;">로딩 중...</span></div>
        <div class="info-box">만세 횟수 <span id="counter" class="count-num">0</span></div>
    </div>
    
    <div id="canvas-container">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="output_canvas"></canvas>
    </div>

    <script>
        const videoElement = document.getElementById('webcam');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const statusText = document.getElementById('status-text');
        const counterElement = document.getElementById('counter');

        let count = 0;
        let isManse = false; 

        function onResults(results) {
            // 모델 로드가 끝나고 첫 프레임이 들어오면 상태 표시 변경
            if (statusText.innerText === "연산 장치 준비 중...") {
                statusText.innerText = "자세 대기 중";
            }

            if (!results.poseLandmarks) {
                statusText.innerText = "사람 없음 🔍";
                return;
            }

            // 실시간 해상도 동기화 보완
            if (canvasElement.width !== videoElement.videoWidth || canvasElement.height !== videoElement.videoHeight) {
                canvasElement.width = videoElement.videoWidth;
                canvasElement.height = videoElement.videoHeight;
            }

            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            // 골격 그리기
            drawConnectors(canvasCtx, results.poseLandmarks, POSE_CONNECTORS, {color: '#00ff55', lineWidth: 3});
            drawLandmarks(canvasCtx, results.poseLandmarks, {color: '#ff0055', lineWidth: 1, radius: 4});

            // 동작 인식 계산
            const leftShoulder = results.poseLandmarks[11];
            const rightShoulder = results.poseLandmarks[12];
            const leftWrist = results.poseLandmarks[15];
            const rightWrist = results.poseLandmarks[16];

            if (leftWrist.y < leftShoulder.y && rightWrist.y < rightShoulder.y) {
                statusText.innerText = "🙌 만세 성공!!";
                statusText.style.color = "#4ade80";
                
                if (!isManse) {
                    count++;
                    counterElement.innerText = count;
                    isManse = true; 
                }
            } else {
                statusText.innerText = "자세 대기 중";
                statusText.style.color = "#38bdf8";
                isManse = false; 
            }

            canvasCtx.restore();
        }

        const pose = new Pose({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
        });
        
        pose.setOptions({
            modelComplexity: 0, // 💡 모바일 가동 속도 향상을 위해 모델 경량화(0단계) 설정
            smoothLandmarks: true,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });
        pose.onResults(onResults);

        // 💡 모바일 브라우저 호환성을 위한 네이티브 카메라 구동 방식으로 변경
        async function startCamera() {
            try {
                statusText.innerText = "카메라 요청 중...";
                // 고정 해상도 대신 모바일 기기가 지원하는 이상적인 환경으로 호출
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "user", width: { ideal: 640 }, height: { ideal: 480 } },
                    audio: false
                });
                videoElement.srcObject = stream;
                
                // 비디오 메타데이터가 로드되면 미디어파이프 루프 시작
                videoElement.onloadedmetadata = () => {
                    statusText.innerText = "연산 장치 준비 중...";
                    
                    async function detectionLoop() {
                        if (!videoElement.paused && !videoElement.ended) {
                            await pose.send({image: videoElement});
                        }
                        // requestAnimationFrame 기반의 부드러운 연속 호출로 멈춤 예방
                        videoElement.requestVideoFrameCallback ? 
                            videoElement.requestVideoFrameCallback(detectionLoop) : 
                            setTimeout(detectionLoop, 40);
                    }
                    detectionLoop();
                };
            } catch (err) {
                statusText.innerText = "❌ 카메라 권한 거부됨";
                console.error(err);
            }
        }

        window.onload = startCamera;
    </script>
</body>
</html>
