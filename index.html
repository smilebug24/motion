
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 챌린지: 실시간 동작 인식기</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>

    <style>
        body { 
            font-family: 'Malgun Gothic', sans-serif; 
            margin: 0; padding: 20px; 
            background: linear-gradient(to bottom, #1e1b4b, #0f172a); 
            color: #f8fafc; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            min-height: 100vh; box-sizing: border-box; 
        }
        h1 { font-size: 1.6rem; margin-bottom: 5px; color: #38bdf8; text-align: center; }
        p { font-size: 0.9rem; color: #94a3b8; margin-top: 0; margin-bottom: 15px; }

        /* 대시보드 스코어 보드 */
        #dashboard {
            display: flex; gap: 15px; width: 100%; max-width: 500px; margin-bottom: 15px;
        }
        .info-box { 
            flex: 1; background: #1e293b; padding: 10px; border-radius: 12px; 
            text-align: center; border: 1px solid #334155; font-weight: bold;
        }
        .count-num { font-size: 1.5rem; color: #facc15; display: block; margin-top: 5px; }

        /* 모바일 플렉서블 컨테이너 */
        #canvas-container { 
            position: relative; width: 100%; max-width: 500px; aspect-ratio: 4 / 3; 
            background: #000; border-radius: 16px; overflow: hidden; border: 2px solid #334155; 
        }
        video { display: none; } /* 원본 영상 숨김 */
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <h1>🏋️‍♂️ AI 모션 트레이너</h1>
    <p>카메라 앞에서 양손을 번쩍 들어 '만세'를 해보세요!</p>
    
    <div id="dashboard">
        <div class="info-box">현재 상태 <span id="status-text" style="color:#38bdf8; display:block; margin-top:5px;">준비 중...</span></div>
        <div class="info-box">만세 횟수 <span id="counter" class="count-num">0</span></div>
    </div>
    
    <div id="canvas-container">
        <video id="webcam" playsinline></video>
        <canvas id="output_canvas"></canvas>
    </div>

    <script>
        const videoElement = document.getElementById('webcam');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const statusText = document.getElementById('status-text');
        const counterElement = document.getElementById('counter');

        let count = 0;
        let isManse = false; // 동작 상태 플래그 (중복 카운트 방지)

        // MediaPipe Pose 모델 결과 수신 및 관절 그리기/동작 인식 후처리 함수
        function onResults(results) {
            if (!results.poseLandmarks) {
                statusText.innerText = "사람 없음 🔍";
                return;
            }

            // 캔버스 정비 및 카메라 화면 그리기
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            // 1. 화면에 관절 포인트 및 골격 선 그리기
            drawConnectors(canvasCtx, results.poseLandmarks, POSE_CONNECTORS, {color: '#00ff55', lineWidth: 3});
            drawLandmarks(canvasCtx, results.poseLandmarks, {color: '#ff0055', lineWidth: 1, radius: 4});

            // 2. [동작 인식 핵심 알고리즘] 주요 관절 좌표 가져오기
            // MediaPipe 인덱스: 11(왼쪽 어깨), 12(오른쪽 어깨), 15(왼쪽 손목), 16(오른쪽 손목)
            const leftShoulder = results.poseLandmarks[11];
            const rightShoulder = results.poseLandmarks[12];
            const leftWrist = results.poseLandmarks[15];
            const rightWrist = results.poseLandmarks[16];

            // 💡 [컴퓨팅 사고력] 양 손목의 Y 좌표가 양 어깨의 Y 좌표보다 높은지(화면 기준으로는 상단일수록 Y값이 작음) 판별
            if (leftWrist.y < leftShoulder.y && rightWrist.y < rightShoulder.y) {
                statusText.innerText = "🙌 만세 성공!!";
                statusText.style.color = "#4ade80";
                
                if (!isManse) {
                    count++;
                    counterElement.innerText = count;
                    isManse = true; // 만세 상태로 변경하여 연속 카운트 방지
                }
            } else {
                statusText.innerText = "자세 대기 중";
                statusText.style.color = "#38bdf8";
                isManse = false; // 손을 내리면 다시 초기화
            }

            canvasCtx.restore();
        }

        // MediaPipe Pose 설정 및 초기화
        const pose = new Pose({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
        });
        
        pose.setOptions({
            modelComplexity: 1,
            smoothLandmarks: true,
            enableSegmentation: false,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });
        pose.onResults(onResults);

        // 카메라 모듈 구동 및 실시간 프레임 전송
        const camera = new Camera(videoElement, {
            onFrame: async () => {
                canvasElement.width = videoElement.videoWidth;
                canvasElement.height = videoElement.videoHeight;
                await pose.send({image: videoElement});
            },
            width: 640,
            height: 480,
            facingMode: "environment" // 스마트폰 접속 시 후면 카메라 기본 설정
        });
        
        statusText.innerText = "카메라 켜는 중...";
        camera.start();
    </script>
</body>
</html>
